<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="home-wrapper">
            <h1>HOME</h1>
            <div class="home-score">0</div>
            <div class="update-score">
                <button onclick="homeAddOne()">+1</button>
                <button onclick="homeAddTwo()">+2</button>
                <button onclick="homeAddThree()">+3</button>
            </div>
        </div>    
        <div class="away-wrapper">
            <h1>AWAY</h1>
            <div class="away-score">0</div>
            <div class="update-score">
                <button onclick="awayAddOne()">+1</button>
                <button onclick="awayAddTwo()">+2</button>
                <button onclick="awayAddThree()">+3</button>
            </div>
        </div>
    </div>

    
    <script src="./script.js"></script>
</body>
</html>
